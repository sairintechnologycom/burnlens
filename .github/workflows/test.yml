name: Tests

# Test-running CI for this repo. Gates PRs on:
#   1. OpenAPI snapshot freshness (backend Pydantic models vs the committed snapshot)
#   2. Frontend vitest, which includes the frontend<->API contract test
#   3. Backend pytest — the full suite, run under requirements-test.txt (the
#      prod-pinned deps, NOT a dev machine's newer packages).
#
# The backend suite was made green and gated here after the pre-existing red
# (36 failed / 12 errors) was resolved. Integration tests that need a real
# Postgres skip cleanly when no DB is reachable (no Postgres service here), and
# the optional google-generativeai provider tests importorskip.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract-and-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Regenerate OpenAPI snapshot
        run: python scripts/dump_openapi.py

      - name: Fail if snapshot is stale
        run: |
          if [ -n "$(git status --porcelain frontend/tests/contract/openapi-schemas.snapshot.json)" ]; then
            git diff -- frontend/tests/contract/openapi-schemas.snapshot.json
            echo "::error::OpenAPI snapshot is out of date or untracked. Run 'npm run contract:snapshot' and commit the result."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests (includes contract test)
        working-directory: frontend
        run: npm run test

  backend-pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run backend pytest suite
        run: pytest tests/ -p no:cacheprovider

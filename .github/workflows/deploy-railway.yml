name: Deploy burnlens_cloud to Railway

on:
  push:
    branches: [main]
    paths:
      - "burnlens_cloud/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Procfile"
      - ".github/workflows/deploy-railway.yml"
  workflow_dispatch:

concurrency:
  group: railway-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install and test backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
          pytest tests/ -p no:cacheprovider
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Test and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Install Railway CLI
        run: npm install --global @railway/cli@5.26.0

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service burnlens-proxy --environment production --ci --detach

      - name: Verify production health
        env:
          HEALTH_URL: ${{ vars.BURNLENS_HEALTH_URL || 'https://api.burnlens.app/health' }}
        run: |
          curl --fail --silent --show-error \
            --retry 12 --retry-delay 10 --retry-all-errors \
            --max-time 10 "$HEALTH_URL"

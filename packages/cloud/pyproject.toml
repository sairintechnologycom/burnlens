[project]
name = "burnlens-cloud"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
  "burnlens-core",
  "fastapi>=0.115",
  "uvicorn[standard]>=0.30",
  "sqlalchemy[asyncio]>=2.0",
  "asyncpg>=0.29",
  "alembic>=1.13",
  "redis>=5.0",
  "cryptography>=42.0",
  "resend>=2.0",
  "httpx>=0.27",
  "pydantic-settings>=2.0",
  "python-dotenv>=1.0",
]

[project.scripts]
burnlens-cloud = "burnlens_cloud.main:run"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

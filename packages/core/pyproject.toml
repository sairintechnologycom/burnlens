[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "burnlens-core"
version = "0.3.1"
description = "Shared business logic for BurnLens — cost calculation, waste detection, pricing, and provider interfaces."
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
authors = [{name = "Bhushan", email = "hello@burnlens.app"}]

dependencies = [
    "httpx>=0.27.0",
]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Signing in — BurnLens</title>
<style>
body{background:#080c10;color:#8b949e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
</style>
</head>
<body>
<p id="msg">Signing you in...</p>
<script>
(function(){
  var hash = window.location.hash;
  var match = hash && hash.match(/token=([^&]+)/);
  if(match && match[1]){
    var token = match[1];
    localStorage.setItem('bl_token', token);
    // Decode plan from JWT payload for dashboard
    try{
      var payload = JSON.parse(atob(token.split('.')[1]));
      if(payload.plan) localStorage.setItem('bl_plan', payload.plan);
    }catch(e){}
    window.location.replace('/dashboard');
  }else{
    document.getElementById('msg').textContent = 'Sign-in failed. Redirecting to signup...';
    setTimeout(function(){ window.location.replace('/signup?error=sso_failed'); }, 2000);
  }
})();
</script>
</body>
</html>

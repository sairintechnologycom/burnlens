<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign Up — BurnLens</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080c10;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{max-width:480px;width:100%}
h1{font-size:1.6rem;margin-bottom:.25rem;color:#fff}
.cyan{color:#00e5c8}
p.sub{color:#8b949e;font-size:.95rem;margin-bottom:1.5rem}
label{display:block;color:#8b949e;font-size:.85rem;margin-bottom:.25rem;margin-top:1rem}
input{width:100%;padding:.6rem .75rem;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:.95rem}
input:focus{outline:none;border-color:#00e5c8}
button{margin-top:1.25rem;width:100%;padding:.7rem;background:#00e5c8;color:#080c10;border:none;border-radius:6px;font-weight:700;font-size:1rem;cursor:pointer;transition:opacity .2s}
button:hover{opacity:.85}
button:disabled{opacity:.5;cursor:not-allowed}
.error{color:#f85149;font-size:.85rem;margin-top:.5rem;display:none}
.success{display:none;margin-top:1.5rem}
.key-box{background:#0d1117;border:1px solid #f0a928;border-radius:6px;padding:.75rem 1rem;font-family:monospace;font-size:.95rem;color:#f0a928;word-break:break-all;display:flex;align-items:center;gap:.5rem;margin:.75rem 0}
.key-box span{flex:1}
.copy-btn{background:#30363d;color:#e6edf3;border:none;padding:.35rem .6rem;border-radius:4px;cursor:pointer;font-size:.8rem}
.copy-btn:hover{background:#484f58}
.steps{margin-top:1rem;color:#8b949e;font-size:.9rem;line-height:1.7}
.steps code{background:#161b22;padding:.15rem .4rem;border-radius:4px;color:#e6edf3;font-size:.85rem}
.link{margin-top:1.25rem;font-size:.9rem;color:#8b949e}
.link a{color:#00e5c8;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <h1>Start tracking LLM costs in <span class="cyan">60 seconds</span></h1>
  <p class="sub">Create a workspace, get an API key, sync from your local proxy.</p>

  <form id="signup-form">
    <label for="workspace">Workspace name</label>
    <input id="workspace" name="workspace_name" required minlength="2" maxlength="60" placeholder="My Team">

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required placeholder="you@company.com">

    <button type="submit" id="btn">Create workspace</button>
    <p class="error" id="err"></p>
  </form>

  <div class="success" id="ok">
    <p style="color:#00e5c8;font-weight:600;margin-bottom:.5rem">Workspace created!</p>
    <p style="color:#8b949e;font-size:.9rem">Your API key:</p>
    <div class="key-box">
      <span id="api-key"></span>
      <button class="copy-btn" id="copy-btn">Copy</button>
    </div>
    <div class="steps">
      <p>1. Install BurnLens: <code>pip install burnlens</code></p>
      <p>2. Login: <code>burnlens login</code></p>
      <p>3. Paste your key: <code id="key-hint">bl_live_xxxx</code></p>
    </div>
    <p class="link"><a href="/dashboard">Go to dashboard →</a></p>
  </div>

  <p class="link">Already have a key? <a href="/dashboard">→ dashboard</a></p>
</div>

<script>
const form=document.getElementById('signup-form');
const btn=document.getElementById('btn');
const err=document.getElementById('err');
const ok=document.getElementById('ok');

form.addEventListener('submit',async e=>{
  e.preventDefault();
  btn.disabled=true;
  err.style.display='none';

  const body={
    workspace_name:document.getElementById('workspace').value,
    email:document.getElementById('email').value
  };

  try{
    const res=await fetch('/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();

    if(!res.ok){
      const msg=typeof data.detail==='object'?data.detail.error||JSON.stringify(data.detail):data.detail;
      throw new Error(msg);
    }

    document.getElementById('api-key').textContent=data.api_key;
    document.getElementById('key-hint').textContent=data.api_key;
    form.style.display='none';
    ok.style.display='block';

    // Store for dashboard redirect
    localStorage.setItem('bl_api_key',data.api_key);
  }catch(e2){
    err.textContent=e2.message;
    err.style.display='block';
    btn.disabled=false;
  }
});

document.getElementById('copy-btn').addEventListener('click',()=>{
  const key=document.getElementById('api-key').textContent;
  navigator.clipboard.writeText(key).then(()=>{
    document.getElementById('copy-btn').textContent='Copied!';
    setTimeout(()=>document.getElementById('copy-btn').textContent='Copy',2000);
  });
});
</script>
</body>
</html>
